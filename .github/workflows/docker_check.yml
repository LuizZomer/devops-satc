name: Docker Check CI

on:
  push:
    branches: [ develop, main ]
  workflow_dispatch:

jobs:
  docker-check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Docker image
        run: docker build -t zomer14/satc-devops:0.0.1 .

      - name: Push Docker image
        run: docker push docker.io/zomer14/satc-devops:0.0.1

      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@v2
        with:
          args: >
            -Dsonar.projectKey=LuizZomer_devops-satc
            -Dsonar.organization=luizzomer
            -Dsonar.host.url=https://sonarcloud.io
            -Dsonar.sources=.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

      # 👇 Mostra vulnerabilidades no log (legível)
      - name: Run Trivy (table output)
        uses: aquasecurity/trivy-action@0.28.0        
        with:
          scan-type: image
          image-ref: docker.io/zomer14/satc-devops:0.0.1
          format: table
          severity: MEDIUM,HIGH,CRITICAL

      # 👇 Gera JSON para análise
      - name: Run Trivy (JSON)
        uses: aquasecurity/trivy-action@0.20.0
        with:
          scan-type: image
          image-ref: docker.io/zomer14/satc-devops:0.0.1
          format: json
          output: trivy-results.json
          severity: MEDIUM,HIGH,CRITICAL

      - name: Upload Trivy results as artifact
        uses: actions/upload-artifact@v4
        with:
          name: trivy-results.json
          path: trivy-results.json

      - name: Analyze Trivy results
        run: |
          if [ -f trivy-results.json ]; then

            echo "Vulnerabilidades médias encontradas:"
            jq -r '.Results[].Vulnerabilities[]? | select(.Severity=="MEDIUM") | "- \(.VulnerabilityID) | \(.PkgName) | \(.InstalledVersion)"' trivy-results.json

            VULN_COUNT=$(jq '[.Results[].Vulnerabilities[]? | select(.Severity == "MEDIUM")] | length' trivy-results.json)

            echo "Quantidade de vulnerabilidades médias: $VULN_COUNT"

            if [ "$VULN_COUNT" -gt 2 ]; then
              echo "Pipeline bloqueada: mais de 2 vulnerabilidades médias encontradas."
              exit 1
            fi
          else
            echo "Arquivo de resultados do Trivy não encontrado."
            exit 1
          fi

      - name: Falhar se houver mais de 2 vulnerabilidades médias (SonarCloud)
        run: |
          COUNT=$(curl -s -u "${SONAR_TOKEN}:" \
            "https://sonarcloud.io/api/issues/search?componentKeys=${SONAR_PROJECT_KEY}&types=VULNERABILITY&severities=MAJOR&resolved=false&ps=1" \
            | jq '.total')

          echo "Quantidade de vulnerabilidades médias (SonarCloud): $COUNT"

          if [ "$COUNT" -gt 2 ]; then
            echo "Pipeline bloqueada: mais de 2 vulnerabilidades médias encontradas."
            exit 1
          fi
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: https://sonarcloud.io
          SONAR_PROJECT_KEY: LuizZomer_devops-satc